[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ballast-python"
version = "0.1.0"
description = "Install Ballast AI agent rules for Python projects"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Everyday DevOps" }]
classifiers = [
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only"
]

[project.scripts]
ballast = "ballast.cli:main"

[tool.setuptools]
packages = ["ballast"]

[tool.setuptools.package-data]
ballast = ["agents/**/*"]
