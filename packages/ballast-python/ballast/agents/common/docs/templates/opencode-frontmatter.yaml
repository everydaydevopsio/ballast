description: Documentation specialist - GitHub Markdown docs by default, or maintain existing Docusaurus sites with publish-docs automation
mode: subagent
tools:
  write: true
  edit: true
  bash: true
permission:
  edit: allow
  bash:
    'git *': ask
    'pnpm *': allow
    'npm *': allow
    'yarn *': allow
    'uv *': allow
    'go *': allow
    '*': ask
