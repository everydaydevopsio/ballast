version: 2

project_name: ballast

release:
  name_template: "ballast v{{ .Version }}"

builds:
  - id: ballast
    binary: ballast
    dir: cli/ballast
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: ballast
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

homebrew_casks:
  - name: ballast
    ids:
      - ballast
    binaries:
      - ballast
    homepage: https://github.com/everydaydevopsio/ballast
    description: CLI that installs AI agent rules for Cursor, Claude Code, OpenCode, and Codex
    license: MIT
    repository:
      owner: everydaydevopsio
      name: homebrew-ballast
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: github-actions[bot]
      email: github-actions[bot]@users.noreply.github.com
    directory: Casks

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
