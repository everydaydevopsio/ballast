name: Publish Go

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without tag prefix)'
        type: string
        required: true
  workflow_call:
    inputs:
      version:
        description: 'Version to publish (without tag prefix)'
        type: string
        required: true

concurrency:
  group: publish-go-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate_cross_language:
    uses: ./.github/workflows/cross-language-validate.yml
    with:
      ref: refs/tags/v${{ inputs.version }}

  release:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: validate_cross_language
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.version }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'

      - name: Verify build
        run: |
          cd packages/ballast-go
          go build -o /tmp/ballast-go-verify ./cmd/ballast-go

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          workdir: packages/ballast-go
          args: release --clean --config .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release_from_version:
    if: ${{ github.event_name == 'workflow_call' }}
    needs: validate_cross_language
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.version }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'

      - name: Verify build
        run: |
          cd packages/ballast-go
          go build -o /tmp/ballast-go-verify ./cmd/ballast-go

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          workdir: packages/ballast-go
          args: release --clean --config .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
