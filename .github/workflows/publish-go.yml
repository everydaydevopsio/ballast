name: Publish Go CLI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without tag prefix)'
        type: string
        required: true
  workflow_call:
    inputs:
      version:
        description: 'Version to publish (without tag prefix)'
        type: string
        required: true

concurrency:
  group: publish-go-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.version }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'

      - name: Verify build
        run: |
          cd cli/ballast
          go build .

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          workdir: cli/ballast
          args: build --snapshot --clean --config .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: ballast-go v${{ inputs.version }}
          files: |
            cli/ballast/dist/*.tar.gz
            cli/ballast/dist/*.zip
            cli/ballast/dist/checksums.txt

  release_from_version:
    if: ${{ github.event_name == 'workflow_call' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.version }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'

      - name: Verify build
        run: |
          cd cli/ballast
          go build .

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          workdir: cli/ballast
          args: build --snapshot --clean --config .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: ballast-go v${{ inputs.version }}
          files: |
            cli/ballast/dist/*.tar.gz
            cli/ballast/dist/*.zip
            cli/ballast/dist/checksums.txt
