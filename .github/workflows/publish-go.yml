name: Publish Go CLI

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (patch/minor)'
        type: choice
        options:
          - patch
          - minor
        default: 'patch'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          LAST_TAG="$(git tag -l 'ballast-go/v*' | sed 's#^ballast-go/v##' | sort -V | tail -n1)"
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="0.1.0"
          fi
          IFS=. read -r MAJOR MINOR PATCH <<< "$LAST_TAG"
          if [ "${{ github.event.inputs.release_type }}" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          set -euo pipefail
          TAG="ballast-go/v${{ steps.version.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"

  release:
    runs-on: ubuntu-latest
    needs: bump
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: refs/tags/ballast-go/v${{ needs.bump.outputs.version }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'

      - name: Verify build
        run: |
          cd packages/ballast-go
          go build ./cmd/ballast

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          workdir: packages/ballast-go
          args: build --snapshot --clean --config .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ballast-go/v${{ needs.bump.outputs.version }}
          name: ballast-go v${{ needs.bump.outputs.version }}
          files: |
            packages/ballast-go/dist/**
