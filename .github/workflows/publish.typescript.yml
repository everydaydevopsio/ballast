name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (patch/minor)'
        type: choice
        options:
          - patch
          - minor
        default: 'patch'
        required: true
  workflow_call:
    inputs:
      version:
        description: 'Version to publish (without v prefix)'
        type: string
        required: true

concurrency:
  group: publish-typescript-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Update lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm --filter @everydaydevopsio/ballast run build

#      - name: Run ballast (all agents, all targets)
#        run: |
#          node packages/ballast-typescript/bin/ballast.js install --yes --target cursor --all --force
#          node packages/ballast-typescript/bin/ballast.js install --yes --target claude --all --force
#          node packages/ballast-typescript/bin/ballast.js install --yes --target opencode --all --force
#          node packages/ballast-typescript/bin/ballast.js install --yes --target codex --all --force

  publish:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    needs: bump

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ needs.bump.outputs.version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @everydaydevopsio/ballast run test

      - name: Publish to npm
        run: |
          echo "git-checks=false" >> .npmrc
          pnpm --dir packages/ballast-typescript publish --access public

  publish_from_version:
    if: ${{ github.event_name == 'workflow_call' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @everydaydevopsio/ballast run test

      - name: Publish to npm
        run: |
          echo "git-checks=false" >> .npmrc
          pnpm --dir packages/ballast-typescript publish --access public
