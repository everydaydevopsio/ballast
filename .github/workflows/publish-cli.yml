name: Publish CLI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without tag prefix)'
        type: string
        required: true
  workflow_call:
    inputs:
      version:
        description: 'Version to publish (without tag prefix)'
        type: string
        required: true

concurrency:
  group: publish-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.version }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'

      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Set up App Store Connect API key
        run: |
          mkdir -p ~/.private_keys
          printf '%s' "$APPLE_API_KEY_CONTENT" | base64 -D \
            > ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
          chmod 600 ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}

      - name: Verify build
        run: |
          cd cli/ballast
          go build -o /tmp/ballast-verify .

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: 'v2.14.0'
          args: release --clean --config cli/ballast/.goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      - name: Notarize darwin release archives
        run: |
          VERSION="${{ inputs.version }}"
          for ARCH in amd64 arm64; do
            ARCHIVE="dist/ballast_${VERSION}_darwin_${ARCH}.tar.gz"
            WORKDIR="/tmp/notarize_${ARCH}"
            mkdir -p "$WORKDIR"

            tar -xzf "$ARCHIVE" -C "$WORKDIR" ballast
            ditto -c -k --keepParent "$WORKDIR/ballast" "$WORKDIR/ballast.zip"

            xcrun notarytool submit "$WORKDIR/ballast.zip" \
              --key ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_KEY_ISSUER_ID" \
              --wait \
              --timeout 20m

            echo "Notarized darwin/${ARCH}"
          done
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}

  release_from_version:
    if: ${{ github.event_name == 'workflow_call' }}
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.version }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'

      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Set up App Store Connect API key
        run: |
          mkdir -p ~/.private_keys
          printf '%s' "$APPLE_API_KEY_CONTENT" | base64 -D \
            > ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
          chmod 600 ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}

      - name: Verify build
        run: |
          cd cli/ballast
          go build -o /tmp/ballast-verify .

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: 'v2.14.0'
          args: release --clean --config cli/ballast/.goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      - name: Notarize darwin release archives
        run: |
          VERSION="${{ inputs.version }}"
          for ARCH in amd64 arm64; do
            ARCHIVE="dist/ballast_${VERSION}_darwin_${ARCH}.tar.gz"
            WORKDIR="/tmp/notarize_${ARCH}"
            mkdir -p "$WORKDIR"

            tar -xzf "$ARCHIVE" -C "$WORKDIR" ballast
            ditto -c -k --keepParent "$WORKDIR/ballast" "$WORKDIR/ballast.zip"

            xcrun notarytool submit "$WORKDIR/ballast.zip" \
              --key ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_KEY_ISSUER_ID" \
              --wait \
              --timeout 20m

            echo "Notarized darwin/${ARCH}"
          done
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
