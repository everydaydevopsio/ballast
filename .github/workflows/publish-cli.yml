name: Publish CLI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without tag prefix)'
        type: string
        required: true
  workflow_call:
    inputs:
      version:
        description: 'Version to publish (without tag prefix)'
        type: string
        required: true

concurrency:
  group: publish-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.version }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'

      - name: Verify build
        run: |
          cd cli/ballast
          go build -o /tmp/ballast-verify .

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: 'v2.14.0'
          args: release --clean --config cli/ballast/.goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  release_from_version:
    if: ${{ github.event_name == 'workflow_call' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.version }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'

      - name: Verify build
        run: |
          cd cli/ballast
          go build -o /tmp/ballast-verify .

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: 'v2.14.0'
          args: release --clean --config cli/ballast/.goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
