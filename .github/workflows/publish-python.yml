name: Publish Python Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix)'
        type: string
        required: true
  workflow_call:
    inputs:
      version:
        description: 'Version to publish (without tag prefix)'
        type: string
        required: true

concurrency:
  group: publish-python-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build package
        run: env UV_CACHE_DIR=/tmp/uv-cache uvx --from build pyproject-build --sdist --wheel packages/ballast-python

      - name: Publish Python artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: ballast-python v${{ inputs.version }}
          overwrite_files: true
          files: |
            packages/ballast-python/dist/*.whl
            packages/ballast-python/dist/*.tar.gz

  publish_from_version:
    if: ${{ github.event_name == 'workflow_call' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build package
        run: env UV_CACHE_DIR=/tmp/uv-cache uvx --from build pyproject-build --sdist --wheel packages/ballast-python

      - name: Publish Python artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: ballast-python v${{ inputs.version }}
          overwrite_files: true
          files: |
            packages/ballast-python/dist/*.whl
            packages/ballast-python/dist/*.tar.gz
