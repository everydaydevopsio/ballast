name: Publish Python Package

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (patch/minor)'
        type: choice
        options:
          - patch
          - minor
        default: 'patch'
        required: true
  workflow_call:
    inputs:
      version:
        description: 'Version to publish (without tag prefix)'
        type: string
        required: true

concurrency:
  group: publish-python-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          LAST_TAG="$(git tag -l 'ballast-python/v*' | sed 's#^ballast-python/v##' | sort -V | tail -n1)"
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="$(sed -nE 's/^version = "([^"]+)"$/\1/p' packages/ballast-python/pyproject.toml | head -n1)"
          fi
          IFS=. read -r MAJOR MINOR PATCH <<< "$LAST_TAG"
          if [ "${{ github.event.inputs.release_type }}" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump pyproject version
        run: |
          set -euo pipefail
          NEW_VERSION="${{ steps.version.outputs.version }}"
          perl -0pi -e 's/^version = "[^"]+"$/version = "'"$NEW_VERSION"'"/m' packages/ballast-python/pyproject.toml

      - name: Commit and tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/ballast-python/pyproject.toml
          git commit -m "chore(python): bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git tag "ballast-python/v${{ steps.version.outputs.version }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:${{ github.ref_name }}
          git push origin "ballast-python/v${{ steps.version.outputs.version }}"

  publish:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    needs: bump
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: refs/tags/ballast-python/v${{ needs.bump.outputs.version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Build package
        run: env UV_CACHE_DIR=/tmp/uv-cache uvx --from build pyproject-build --sdist --wheel packages/ballast-python

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/ballast-python/dist

  publish_from_version:
    if: ${{ github.event_name == 'workflow_call' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Build package
        run: env UV_CACHE_DIR=/tmp/uv-cache uvx --from build pyproject-build --sdist --wheel packages/ballast-python

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/ballast-python/dist
