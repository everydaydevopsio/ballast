name: Examples Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  smoke:
    name: ${{ matrix.sample }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sample: go-sample
            language: go
            expected_rule: go-linting.mdc
          - sample: python-sample
            language: python
            expected_rule: python-linting.mdc
          - sample: typescript-sample
            language: typescript
            expected_rule: typescript-linting.mdc
          - sample: ansible-sample
            language: ansible
            expected_rule: ansible-linting.mdc
          - sample: terraform-sample
            language: terraform
            expected_rule: terraform-linting.mdc

    steps:
      - name: Checkout ballast repo
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/ballast-go/go.mod

      - name: Build ballast-go CLI
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/.ci/bin"

          go build -C packages/ballast-go -o "$GITHUB_WORKSPACE/.ci/bin/ballast-go" ./cmd/ballast-go
          echo "$GITHUB_WORKSPACE/.ci/bin" >> "$GITHUB_PATH"

      - name: Run smoke install
        run: |
          set -euo pipefail
          cd "examples/smoke/${{ matrix.sample }}"
          ballast-go install --language "${{ matrix.language }}" --target cursor --target opencode,codex --agent linting --yes

      - name: Verify outputs
        run: |
          set -euo pipefail
          rule_md="${{ matrix.expected_rule }}"
          rule_md="${rule_md%.mdc}.md"
          test -f "examples/smoke/${{ matrix.sample }}/.cursor/rules/${{ matrix.expected_rule }}"
          test -f "examples/smoke/${{ matrix.sample }}/.opencode/${rule_md}"
          test -f "examples/smoke/${{ matrix.sample }}/.codex/rules/${rule_md}"
          grep -q '"targets"' "examples/smoke/${{ matrix.sample }}/.rulesrc.json"
          grep -q '"cursor"' "examples/smoke/${{ matrix.sample }}/.rulesrc.json"
          grep -q '"opencode"' "examples/smoke/${{ matrix.sample }}/.rulesrc.json"
          grep -q '"codex"' "examples/smoke/${{ matrix.sample }}/.rulesrc.json"
          grep -q '## Installed agent rules' "examples/smoke/${{ matrix.sample }}/AGENTS.md"

  skills-smoke:
    name: skills-smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ballast repo
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/ballast-go/go.mod

      - name: Build ballast-go CLI
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/.ci/bin"
          go build -C packages/ballast-go -o "$GITHUB_WORKSPACE/.ci/bin/ballast-go" ./cmd/ballast-go
          echo "$GITHUB_WORKSPACE/.ci/bin" >> "$GITHUB_PATH"

      - name: Run skills smoke test
        run: ./scripts/smoke-skills.sh "$GITHUB_WORKSPACE"

  tasks-smoke:
    name: tasks-smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ballast repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ballast-typescript
        run: pnpm run build

      - name: Run tasks smoke test
        run: ./scripts/smoke-tasks.sh "$GITHUB_WORKSPACE"

  config-persistence-smoke:
    name: config-persistence-smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ballast repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ballast-typescript
        run: pnpm run build

      - name: Run config-persistence smoke test
        run: ./scripts/smoke-config-persistence.sh "$GITHUB_WORKSPACE"

  monorepo-patch-smoke:
    name: monorepo-patch-smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ballast repo
        uses: actions/checkout@v6

      - name: Checkout ballast-examples repo
        uses: actions/checkout@v6
        with:
          repository: everydaydevopsio/ballast-examples
          path: .ci/ballast-examples

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.27.0

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/ballast-go/go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ballast-typescript
        run: pnpm run build

      - name: Build ballast-go
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/.ci/bin"
          go build -C packages/ballast-go -o "$GITHUB_WORKSPACE/.ci/bin/ballast-go" ./cmd/ballast-go
          echo "$GITHUB_WORKSPACE/.ci/bin" >> "$GITHUB_PATH"

      - name: Build ballast wrapper
        run: |
          set -euo pipefail
          go build -C cli/ballast -o "$GITHUB_WORKSPACE/.ci/bin/ballast" .

      - name: Create local backend shims
        run: |
          set -euo pipefail
          cat > "$GITHUB_WORKSPACE/.ci/bin/ballast-typescript" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          node "$GITHUB_WORKSPACE/packages/ballast-typescript/dist/cli.js" "$@"
          EOF
          chmod +x "$GITHUB_WORKSPACE/.ci/bin/ballast-typescript"

          cat > "$GITHUB_WORKSPACE/.ci/bin/ballast-python" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          PYTHONPATH="$GITHUB_WORKSPACE/packages/ballast-python${PYTHONPATH:+:$PYTHONPATH}" python3 -m ballast "$@"
          EOF
          chmod +x "$GITHUB_WORKSPACE/.ci/bin/ballast-python"

      - name: Run monorepo patch smoke test
        run: ./scripts/smoke-monorepo-patch.sh "$GITHUB_WORKSPACE/.ci/ballast-examples"

      - name: Run wrapper monorepo smoke test
        run: ./scripts/smoke-wrapper-monorepo.sh
