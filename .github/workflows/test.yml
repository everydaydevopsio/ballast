name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typescript-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript package unit tests
        run: pnpm --filter @everydaydevopsio/ballast run test

  typescript-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript package tests with coverage
        run: pnpm --filter @everydaydevopsio/ballast run test:coverage

      - name: Upload TypeScript coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./packages/ballast-typescript/coverage/lcov.info
          flags: typescript
          name: codecov-typescript
          fail_ci_if_error: false

  python-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run Python package unit tests with coverage
        working-directory: packages/ballast-python
        run: |
          uv run --with coverage coverage run --source=ballast -m unittest discover -s tests
          uv run --with coverage coverage xml -o coverage.xml

      - name: Upload Python coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./packages/ballast-python/coverage.xml
          flags: python
          name: codecov-python
          fail_ci_if_error: false

  go-pack-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'

      - name: Run ballast-go unit tests with coverage
        working-directory: packages/ballast-go
        run: go test ./... -covermode=atomic -coverprofile=coverage.out

      - name: Upload ballast-go coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./packages/ballast-go/coverage.out
          flags: go-pack
          name: codecov-go-pack
          fail_ci_if_error: false

  cli-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'

      - name: Run ballast wrapper unit tests with coverage
        working-directory: cli/ballast
        run: go test ./... -covermode=atomic -coverprofile=coverage.out

      - name: Upload ballast wrapper coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./cli/ballast/coverage.out
          flags: cli
          name: codecov-cli
          fail_ci_if_error: false
