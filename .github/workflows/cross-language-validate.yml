name: Cross-Language Validate

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to validate
        required: false
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.27.0

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/ballast-go/go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript CLI
        run: pnpm run build

      - name: Build Go CLIs
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/.ci/bin"
          go build -C packages/ballast-go -o "$GITHUB_WORKSPACE/.ci/bin/ballast-go" ./cmd/ballast-go
          go build -C cli/ballast -o "$GITHUB_WORKSPACE/.ci/bin/ballast" .
          echo "$GITHUB_WORKSPACE/.ci/bin" >> "$GITHUB_PATH"

      - name: Create local backend shims
        run: |
          set -euo pipefail
          cat > "$GITHUB_WORKSPACE/.ci/bin/ballast-typescript" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          node "$GITHUB_WORKSPACE/packages/ballast-typescript/dist/cli.js" "$@"
          EOF
          chmod +x "$GITHUB_WORKSPACE/.ci/bin/ballast-typescript"

          cat > "$GITHUB_WORKSPACE/.ci/bin/ballast-python" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          PYTHONPATH="$GITHUB_WORKSPACE/packages/ballast-python${PYTHONPATH:+:$PYTHONPATH}" python3 -m ballast "$@"
          EOF
          chmod +x "$GITHUB_WORKSPACE/.ci/bin/ballast-python"

      - name: Run cross-language validation
        run: ./scripts/release-cross-language-check.sh
