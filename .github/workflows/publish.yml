name: Publish All Packages

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (patch/minor)'
        type: choice
        options:
          - patch
          - minor
        default: 'patch'
        required: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump_and_tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Get Previous tag
        id: previoustag
        uses: WyriHaximus/github-action-get-previous-tag@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get next version
        id: semvers
        uses: WyriHaximus/github-action-next-semvers@v1
        with:
          version: ${{ steps.previoustag.outputs.tag }}

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event.inputs.release_type }}" = "minor" ]; then
            echo "version=${{ steps.semvers.outputs.minor }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ steps.semvers.outputs.patch }}" >> $GITHUB_OUTPUT
          fi

      - name: Bump TypeScript package version
        run: |
          set -euo pipefail
          npm --prefix packages/ballast-typescript version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Bump Python package version
        run: |
          set -euo pipefail
          uv version --directory packages/ballast-python "${{ steps.version.outputs.version }}" --frozen

      - name: Commit and create tag
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add packages/ballast-typescript/package.json packages/ballast-python/pyproject.toml
          git commit -m "chore(release): bump version to ${VERSION} [skip ci]"

          git tag "v${VERSION}"

      - name: Push commit and tag
        run: |
          set -euo pipefail
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${{ steps.version.outputs.version }}"

  publish_typescript:
    needs: bump_and_tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ needs.bump_and_tag.outputs.version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @everydaydevopsio/ballast run test

      - name: Publish to npm
        working-directory: packages/ballast-typescript
        run: npm publish --access public --provenance

  publish_python:
    needs: bump_and_tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ needs.bump_and_tag.outputs.version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build package
        run: env UV_CACHE_DIR=/tmp/uv-cache uvx --from build pyproject-build --sdist --wheel packages/ballast-python

      - name: Publish Python artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump_and_tag.outputs.version }}
          name: ballast-python v${{ needs.bump_and_tag.outputs.version }}
          overwrite_files: true
          files: |
            packages/ballast-python/dist/*.whl
            packages/ballast-python/dist/*.tar.gz

  publish_go:
    needs:
      - bump_and_tag
      - publish_python
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ needs.bump_and_tag.outputs.version }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'

      - name: Verify build
        run: |
          cd cli/ballast
          go build .

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          workdir: cli/ballast
          args: build --snapshot --clean --config .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump_and_tag.outputs.version }}
          name: ballast-go v${{ needs.bump_and_tag.outputs.version }}
          files: |
            cli/ballast/dist/*.tar.gz
            cli/ballast/dist/*.zip
            cli/ballast/dist/checksums.txt
