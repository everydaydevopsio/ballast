name: Publish All Packages

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (patch/minor)'
        type: choice
        options:
          - patch
          - minor
        default: 'patch'
        required: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump_and_tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version: ${{ steps.unified_version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Get Previous tag
        id: previoustag
        uses: WyriHaximus/github-action-get-previous-tag@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get next version
        id: semvers
        uses: WyriHaximus/github-action-next-semvers@v1
        with:
          version: ${{ steps.previoustag.outputs.tag }}

      - name: Bump TypeScript package version
        run: |
          set -euo pipefail
          npm --prefix packages/ballast-typescript version "${{ github.event.inputs.release_type }}" --no-git-tag-version

      - name: Bump Python package version
        run: |
          set -euo pipefail
          uv version --directory packages/ballast-python --bump "${{ github.event.inputs.release_type }}" --frozen

      - name: Capture and verify unified version
        id: unified_version
        run: |
          set -euo pipefail
          TS_VERSION="$(node -p "require('./packages/ballast-typescript/package.json').version")"
          PY_VERSION="$(uv version --directory packages/ballast-python --short)"
          if [ "$TS_VERSION" != "$PY_VERSION" ]; then
            echo "Version mismatch after bump: TS=$TS_VERSION Python=$PY_VERSION"
            exit 1
          fi
          echo "version=$TS_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and create tags
        run: |
          set -euo pipefail
          VERSION="${{ steps.unified_version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add packages/ballast-typescript/package.json packages/ballast-python/pyproject.toml
          git commit -m "chore(release): bump version to ${VERSION} [skip ci]"

          git tag "v${VERSION}"

      - name: Push commit and tags
        run: |
          set -euo pipefail
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${{ steps.unified_version.outputs.version }}"

  publish_typescript:
    needs: bump_and_tag
    uses: ./.github/workflows/publish.typescript.yml
    with:
      version: ${{ needs.bump_and_tag.outputs.version }}
    secrets: inherit

  publish_python:
    needs: bump_and_tag
    uses: ./.github/workflows/publish-python.yml
    with:
      version: ${{ needs.bump_and_tag.outputs.version }}
    secrets: inherit

  publish_go:
    needs: bump_and_tag
    uses: ./.github/workflows/publish-go.yml
    with:
      version: ${{ needs.bump_and_tag.outputs.version }}
    secrets: inherit
